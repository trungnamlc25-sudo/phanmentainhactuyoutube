<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader - Tải nhạc & video từ YouTube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            color: #e4e4e7;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(139, 92, 246, 0.15) 0%, rgba(236, 72, 153, 0.08) 40%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow-2 {
            position: fixed;
            bottom: -300px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(59, 130, 246, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 50px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.3);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f9fafb, #d1d5db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: #71717a;
            font-size: 1rem;
            font-weight: 400;
        }

        .card {
            background: rgba(24, 24, 37, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 120px 16px 48px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            color: #f4f4f5;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: rgba(139, 92, 246, 0.5);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .input-wrapper input::placeholder {
            color: #52525b;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #52525b;
            font-size: 1.1rem;
            pointer-events: none;
        }

        .btn-search {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            padding: 10px 20px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.875rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-search:hover {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
        }

        .btn-search:active {
            transform: translateY(-50%) scale(0.97);
        }

        .btn-search:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        .video-info {
            display: none;
            margin-top: 24px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .video-info.show {
            display: block;
        }

        .video-info-content {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .video-thumbnail-wrapper {
            position: relative;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-thumbnail {
            width: 160px;
            height: 90px;
            object-fit: cover;
            display: block;
        }

        .video-duration-badge {
            position: absolute;
            bottom: 6px;
            right: 6px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .video-details {
            flex: 1;
            min-width: 0;
        }

        .video-details h3 {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 6px;
            color: #f4f4f5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .video-meta span {
            color: #71717a;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .format-section {
            display: none;
            margin-top: 28px;
            animation: slideUp 0.4s ease;
        }

        .format-section.show {
            display: block;
        }

        .section-label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #71717a;
            margin-bottom: 14px;
        }

        .format-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .format-btn {
            position: relative;
            padding: 20px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.02);
            color: #a1a1aa;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            overflow: hidden;
        }

        .format-btn:hover {
            border-color: rgba(139, 92, 246, 0.3);
            background: rgba(139, 92, 246, 0.05);
            color: #e4e4e7;
        }

        .format-btn.active {
            border-color: rgba(139, 92, 246, 0.5);
            background: rgba(139, 92, 246, 0.1);
            color: #f4f4f5;
            box-shadow: 0 0 24px rgba(139, 92, 246, 0.1);
        }

        .format-btn.active .format-icon {
            color: #a78bfa;
        }

        .format-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
            transition: color 0.25s;
        }

        .format-name {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .format-desc {
            font-size: 0.75rem;
            color: #52525b;
            margin-top: 4px;
        }

        .format-btn.active .format-desc {
            color: #71717a;
        }

        .format-check {
            display: none;
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            background: #8b5cf6;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .format-btn.active .format-check {
            display: flex;
        }

        .btn-download {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
        }

        .btn-download::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .btn-download:hover::before {
            opacity: 1;
        }

        .btn-download:hover {
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.3), 0 2px 8px rgba(236, 72, 153, 0.2);
            transform: translateY(-1px);
        }

        .btn-download:active {
            transform: translateY(0);
        }

        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .progress-section {
            display: none;
            margin-top: 24px;
            animation: slideUp 0.3s ease;
        }

        .progress-section.show {
            display: block;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #8b5cf6, #ec4899);
            border-radius: 3px;
            transition: width 0.4s ease;
            width: 0%;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            text-align: center;
            color: #71717a;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .alert {
            display: none;
            padding: 14px 18px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            line-height: 1.5;
            animation: slideUp 0.3s ease;
        }

        .alert.show {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .alert-icon {
            flex-shrink: 0;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .footer {
            text-align: center;
            margin-top: 48px;
            color: #3f3f46;
            font-size: 0.8rem;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .container { padding: 32px 16px; }
            .header h1 { font-size: 1.6rem; }
            .card { padding: 24px 18px; }
            .input-wrapper input { padding: 14px 110px 14px 44px; font-size: 0.9rem; }
            .btn-search { padding: 8px 16px; font-size: 0.8rem; }
            .video-info-content { flex-direction: column; text-align: center; }
            .video-thumbnail { width: 100%; height: auto; max-height: 200px; }
            .video-meta { align-items: center; }
            .format-buttons { grid-template-columns: 1fr 1fr; gap: 10px; }
            .format-btn { padding: 16px 12px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <div class="header">
            <div class="header-icon">
                <span>&#9654;</span>
            </div>
            <h1>YouTube Downloader</h1>
            <p>Tải nhạc và video chất lượng cao</p>
        </div>

        <div class="card">
            <div class="input-wrapper">
                <span class="input-icon">&#128279;</span>
                <input type="text" id="urlInput" placeholder="Dán link YouTube vào đây..." autofocus>
                <button class="btn-search" id="btnGetInfo" onclick="getVideoInfo()">
                    <span>Tìm kiếm</span>
                </button>
            </div>

            <div class="video-info" id="videoInfo">
                <div class="video-info-content">
                    <div class="video-thumbnail-wrapper">
                        <img class="video-thumbnail" id="videoThumbnail" src="" alt="Thumbnail">
                        <span class="video-duration-badge" id="videoDurationBadge"></span>
                    </div>
                    <div class="video-details">
                        <h3 id="videoTitle"></h3>
                        <div class="video-meta">
                            <span id="videoChannel"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="format-section" id="formatSection">
                <p class="section-label">Chọn định dạng</p>
                <div class="format-buttons">
                    <div class="format-btn active" id="btnMp3" onclick="selectFormat('mp3')">
                        <div class="format-check">&#10003;</div>
                        <div class="format-icon">&#127925;</div>
                        <div class="format-name">MP3</div>
                        <div class="format-desc">Âm thanh 192kbps</div>
                    </div>
                    <div class="format-btn" id="btnMp4" onclick="selectFormat('mp4')">
                        <div class="format-check">&#10003;</div>
                        <div class="format-icon">&#127916;</div>
                        <div class="format-name">MP4</div>
                        <div class="format-desc">Video chất lượng cao</div>
                    </div>
                </div>
                <button class="btn-download" id="btnDownload" onclick="startDownload()">
                    Tải xuống
                </button>
            </div>

            <div class="progress-section" id="progressSection">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <p class="progress-text" id="progressText">Đang chuẩn bị...</p>
            </div>

            <div class="alert alert-error" id="errorMessage">
                <span class="alert-icon">&#9888;</span>
                <span id="errorText"></span>
            </div>
            <div class="alert alert-success" id="successMessage">
                <span class="alert-icon">&#10004;</span>
                <span>Tải xuống thành công! File đang được lưu...</span>
            </div>
        </div>

        <div class="footer">
            <p>YouTube Downloader &copy; 2024</p>
        </div>
    </div>

    <script>
        let selectedFormat = 'mp3';
        let currentUrl = '';

        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') getVideoInfo();
        });

        function selectFormat(format) {
            selectedFormat = format;
            document.getElementById('btnMp3').classList.toggle('active', format === 'mp3');
            document.getElementById('btnMp4').classList.toggle('active', format === 'mp4');
        }

        function formatDuration(seconds) {
            if (!seconds) return '';
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            if (hrs > 0) {
                return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 6000);
        }

        function hideAll() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
            document.getElementById('progressSection').classList.remove('show');
        }

        async function getVideoInfo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                showError('Vui lòng nhập link YouTube!');
                return;
            }

            hideAll();
            const btn = document.getElementById('btnGetInfo');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>';

            document.getElementById('videoInfo').classList.remove('show');
            document.getElementById('formatSection').classList.remove('show');

            try {
                const response = await fetch('/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Có lỗi xảy ra');
                    return;
                }

                currentUrl = url;

                document.getElementById('videoThumbnail').src = data.thumbnail;
                document.getElementById('videoTitle').textContent = data.title;
                document.getElementById('videoChannel').textContent = data.channel;
                document.getElementById('videoDurationBadge').textContent = formatDuration(data.duration);

                document.getElementById('videoInfo').classList.add('show');
                document.getElementById('formatSection').classList.add('show');
            } catch (err) {
                showError('Không thể kết nối đến server. Vui lòng thử lại!');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Tìm kiếm</span>';
            }
        }

        async function startDownload() {
            if (!currentUrl) {
                showError('Vui lòng tìm kiếm video trước!');
                return;
            }

            hideAll();
            const btn = document.getElementById('btnDownload');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Đang xử lý...';

            document.getElementById('progressSection').classList.add('show');
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressText').textContent = 'Đang bắt đầu tải...';

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: currentUrl, format: selectedFormat })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Có lỗi xảy ra');
                    btn.disabled = false;
                    btn.innerHTML = 'Tải xuống';
                    document.getElementById('progressSection').classList.remove('show');
                    return;
                }

                pollStatus(data.task_id);
            } catch (err) {
                showError('Không thể kết nối đến server!');
                btn.disabled = false;
                btn.innerHTML = 'Tải xuống';
                document.getElementById('progressSection').classList.remove('show');
            }
        }

        function pollStatus(taskId) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/status/${taskId}`);
                    const data = await response.json();

                    if (data.status === 'downloading') {
                        document.getElementById('progressBar').style.width = data.progress + '%';
                        document.getElementById('progressText').textContent =
                            `Đang tải... ${data.progress}%`;
                    } else if (data.status === 'converting') {
                        document.getElementById('progressBar').style.width = '100%';
                        document.getElementById('progressText').textContent =
                            'Đang chuyển đổi định dạng...';
                    } else if (data.status === 'completed') {
                        clearInterval(interval);
                        document.getElementById('progressBar').style.width = '100%';
                        document.getElementById('progressText').textContent = 'Hoàn thành!';

                        const successEl = document.getElementById('successMessage');
                        successEl.classList.add('show');

                        window.location.href = `/api/file/${taskId}`;

                        const btn = document.getElementById('btnDownload');
                        btn.disabled = false;
                        btn.innerHTML = 'Tải xuống';
                    } else if (data.status === 'error') {
                        clearInterval(interval);
                        showError(data.error || 'Có lỗi xảy ra khi tải!');
                        document.getElementById('progressSection').classList.remove('show');

                        const btn = document.getElementById('btnDownload');
                        btn.disabled = false;
                        btn.innerHTML = 'Tải xuống';
                    }
                } catch (err) {
                    clearInterval(interval);
                    showError('Mất kết nối với server!');
                    document.getElementById('progressSection').classList.remove('show');

                    const btn = document.getElementById('btnDownload');
                    btn.disabled = false;
                    btn.innerHTML = 'Tải xuống';
                }
            }, 1000);
        }
    </script>
</body>
</html>
